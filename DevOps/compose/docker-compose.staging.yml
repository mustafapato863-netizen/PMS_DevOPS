services:
  db:
    image: postgres:15-alpine
    container_name: pms_postgres_db_staging
    environment:
      POSTGRES_DB: PMS_Sys_Staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PMS_Sys_Staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pms_redis_cache_staging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data_staging:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../Backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: pms_fastapi_app_staging
    ports:
      - "8080:7860"
    environment:
      - APP_ENV=staging
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/PMS_Sys_Staging
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=1440
      - PMS_DATA_DIR=/app/data
      - CORS_ORIGINS=${CORS_ORIGINS}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-26214400}
      - PORT=7860
    volumes:
      - backend_data_staging:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  postgres_data_staging:
  redis_data_staging:
  backend_data_staging:
