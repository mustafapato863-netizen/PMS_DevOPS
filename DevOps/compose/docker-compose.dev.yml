version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: pms_postgres_db_dev
    environment:
      POSTGRES_DB: PMS_Sys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PMS_Sys"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pms_redis_cache_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../Backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: pms_fastapi_app_dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/PMS_Sys
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=devsecretkey12345
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=1440
      - PMS_DATA_DIR=/app/data
      - PMS_DEFAULT_FILE_PATH=/app/data/PMS_Trend_All.xlsx
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data_dev:
  redis_data_dev:
