services:
  db:
    image: postgres:15-alpine
    container_name: pms_postgres_db_dev
    environment:
      POSTGRES_DB: PMS_Sys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PMS_Sys"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pms_redis_cache_dev
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../Backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: pms_fastapi_app_dev
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/PMS_Sys
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=1440
      - PMS_DATA_DIR=/app/data
      - PMS_DEFAULT_FILE_PATH=/app/data/PMS_Trend_All.xlsx
      - CORS_ORIGINS=${CORS_ORIGINS}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-26214400}
      - PORT=8000
    volumes:
      - backend_data_dev:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data_dev:
  redis_data_dev:
  backend_data_dev:
