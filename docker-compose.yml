version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: pms-backend-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - PMS_DATA_DIR=/app/data
      - PMS_DEFAULT_FILE_PATH=/app/data/PMS_Trend_All.xlsx
    volumes:
      - pms-backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/performance')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pms-backend-data:
    name: pms-backend-data
    driver: local
