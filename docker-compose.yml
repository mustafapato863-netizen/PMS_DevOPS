version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: pms_postgres_db
    environment:
      POSTGRES_DB: PMS_Sys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PMS_Sys"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: pms_redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  web:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: pms_fastapi_app
    ports:
      - "7860:7860"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/PMS_Sys
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super_secret_pms_dashboard_key_12345!@#
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=60
      - PMS_DATA_DIR=/app/data
      - PMS_DEFAULT_FILE_PATH=/app/data/PMS_Trend_All.xlsx
      - PORT=7860
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  redis_data:
